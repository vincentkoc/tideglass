name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module cache
        run: go mod verify

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck
        run: '"$(go env GOPATH)/bin/govulncheck" ./...'

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          changed="$(gofmt -l .)"
          if [ -n "$changed" ]; then
            printf 'gofmt wants changes in:\n%s\n' "$changed"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -count=1 ./...

      - name: Build CLI
        run: go build -ldflags "-X main.version=ci" -o bin/tideglass ./cmd/tideglass

      - name: Smoke test CLI control surface
        run: |
          set -euo pipefail
          test "$(./bin/tideglass version)" = "ci"
          output="$(./bin/tideglass help 2>&1)"
          printf '%s\n' "$output"
          printf '%s' "$output" | grep -q "review --kind"
          db="$RUNNER_TEMP/tideglass.db"
          ./bin/tideglass init --db "$db" | grep -q "$db"
          ./bin/tideglass doctor --db "$db" --json | grep -q '"overall_state"'
          ./bin/tideglass sources --db "$db" --json | grep -q '"sources"'

  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Snapshot release build
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
